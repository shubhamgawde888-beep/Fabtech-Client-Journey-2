<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fabtech — Client Project Journey</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff; --bg2: #f7f7f5; --bg3: #f0efeb;
      --text: #1a1a18; --text2: #6b6a64;
      --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.2);
      --blue: #185FA5; --blue-light: #E6F1FB; --blue-text: #0C447C;
      --green: #0F6E56; --green-light: #E1F5EE; --green-text: #085041;
      --radius: 12px; --radius-sm: 8px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1a; --bg2: #252523; --bg3: #2e2e2b;
        --text: #e8e6de; --text2: #9c9a92;
        --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
        --blue-light: #0c2a45; --blue-text: #85B7EB;
        --green-light: #04342C; --green-text: #5DCAA5;
      }
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg2); color: var(--text); min-height: 100vh; display: flex; justify-content: center; padding: 2rem 1rem; }
    #app { width: 100%; max-width: 680px; }
    .site-header { text-align: center; margin-bottom: 2rem; }
    .logo-row { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 6px; }
    .logo-icon { width: 40px; height: 40px; background: var(--blue); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 20px; }
    .site-header h1 { font-size: 22px; font-weight: 600; color: var(--text); }
    .site-header p { font-size: 14px; color: var(--text2); margin-top: 4px; }
    .steps-track { display: flex; align-items: flex-start; margin-bottom: 1.5rem; overflow-x: auto; padding-bottom: 4px; }
    .step-dot-wrap { display: flex; flex-direction: column; align-items: center; flex: 1; min-width: 64px; cursor: pointer; }
    .step-dot { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; border: 1.5px solid var(--border2); background: var(--bg); color: var(--text2); transition: all .2s; }
    .step-dot.active { background: var(--blue); border-color: var(--blue); color: #fff; }
    .step-dot.done { background: var(--green); border-color: var(--green); color: #fff; }
    .step-label { font-size: 10px; color: var(--text2); text-align: center; margin-top: 5px; line-height: 1.3; max-width: 60px; }
    .step-label.active { color: var(--blue); font-weight: 600; }
    .connector { flex: 1; height: 1.5px; background: var(--border); margin-top: 16px; min-width: 8px; transition: background .3s; }
    .connector.done { background: var(--green); }
    .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1rem; }
    .card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .step-badge { width: 30px; height: 30px; border-radius: 50%; background: var(--blue-light); display: flex; align-items: center; justify-content: center; font-size: 14px; color: var(--blue); flex-shrink: 0; }
    .step-badge.green { background: var(--green-light); color: var(--green); }
    .card h2 { font-size: 16px; font-weight: 600; color: var(--text); }
    .card p { font-size: 13px; color: var(--text2); line-height: 1.65; margin-bottom: 10px; }
    .section-label { font-size: 10px; color: var(--text2); font-weight: 600; letter-spacing: .5px; text-transform: uppercase; margin-bottom: 6px; }
    .deliverables { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
    .tag { font-size: 11px; background: var(--bg2); color: var(--text2); border: 0.5px solid var(--border); border-radius: 20px; padding: 3px 10px; }
    .timeline-row { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2); }
    .nav-row { display: flex; gap: 10px; margin-bottom: 1rem; }
    .nav-row button { flex: 1; padding: 9px; font-size: 13px; font-weight: 500; border-radius: var(--radius-sm); border: 0.5px solid var(--border2); background: var(--bg); color: var(--text); cursor: pointer; transition: background .15s; }
    .nav-row button:hover { background: var(--bg2); }
    .nav-row button.primary { background: var(--blue); border-color: var(--blue); color: #fff; }
    .nav-row button.primary:hover { background: #0C447C; }
    .nav-row button:disabled { opacity: 0.35; cursor: default; }
    .chat-section { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1rem; }
    .chat-label { font-size: 12px; color: var(--text2); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
    .ai-badge { background: var(--blue-light); color: var(--blue-text); font-size: 10px; border-radius: 10px; padding: 2px 8px; font-weight: 600; }
    .messages { min-height: 60px; max-height: 240px; overflow-y: auto; margin-bottom: 10px; display: flex; flex-direction: column; gap: 8px; }
    .msg { font-size: 13px; line-height: 1.55; padding: 9px 12px; border-radius: 12px; max-width: 88%; }
    .msg.user { background: var(--blue); color: #fff; align-self: flex-end; border-bottom-right-radius: 3px; }
    .msg.ai { background: var(--bg2); color: var(--text); border: 0.5px solid var(--border); align-self: flex-start; border-bottom-left-radius: 3px; }
    .quick-btns { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
    .quick-btn { font-size: 11px; border: 0.5px solid var(--border2); border-radius: 20px; padding: 4px 10px; background: var(--bg2); color: var(--text2); cursor: pointer; transition: background .15s; }
    .quick-btn:hover { background: var(--bg3); }
    .chat-input-row { display: flex; gap: 8px; }
    .chat-input-row input { flex: 1; font-size: 13px; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); background: var(--bg2); color: var(--text); padding: 8px 12px; outline: none; font-family: inherit; }
    .chat-input-row input:focus { border-color: var(--blue); }
    .chat-input-row button { padding: 8px 16px; font-size: 13px; border-radius: var(--radius-sm); border: none; background: var(--blue); color: #fff; cursor: pointer; }
    .lead-form { display: flex; flex-direction: column; gap: 10px; margin-top: 8px; }
    .lead-form input { font-size: 13px; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); background: var(--bg2); color: var(--text); padding: 10px 12px; outline: none; font-family: inherit; }
    .lead-form input:focus { border-color: var(--blue); }
    .lead-form button { padding: 10px; font-size: 14px; font-weight: 600; border-radius: var(--radius-sm); border: none; background: var(--green); color: #fff; cursor: pointer; }
    .success-msg { text-align: center; padding: 2rem 1rem; }
    .success-msg i { font-size: 36px; color: var(--green); display: block; margin-bottom: 10px; }
    .success-msg h3 { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
    .success-msg p { font-size: 13px; color: var(--text2); }
    .footer { text-align: center; margin-top: 2rem; font-size: 12px; color: var(--text2); }
  </style>
</head>
<body>
<div id="app">
  <div class="site-header">
    <div class="logo-row">
      <div class="logo-icon"><i class="ti ti-building-factory-2"></i></div>
      <h1>Fabtech project journey</h1>
    </div>
    <p>Your end-to-end pharma plant &amp; cleanroom setup — from first call to handover</p>
  </div>
  <div class="steps-track" id="steps-track"></div>
  <div id="step-card"></div>
  <div class="nav-row">
    <button id="prev-btn" onclick="changeStep(-1)"><i class="ti ti-arrow-left"></i> Previous</button>
    <button id="next-btn" class="primary" onclick="changeStep(1)">Next <i class="ti ti-arrow-right"></i></button>
  </div>
  <div class="chat-section">
    <div class="chat-label">
      <i class="ti ti-message-circle" style="font-size:15px"></i>
      Fabtech FAQ assistant
      <span class="ai-badge">Smart Q&amp;A</span>
    </div>
    <div class="messages" id="messages"></div>
    <div class="quick-btns" id="quick-btns"></div>
    <div class="chat-input-row">
      <input id="chat-input" placeholder="Ask anything about this step…" onkeydown="if(event.key==='Enter')sendMsg()">
      <button onclick="sendMsg()"><i class="ti ti-send" style="font-size:14px"></i></button>
    </div>
  </div>
  <div class="footer">© 2025 Fabtech Technologies International Ltd. · Mumbai, India</div>
</div>

<script>
const steps = [
  {
    title: "Initial consultation",
    label: "Consultation",
    icon: "ti-phone-call",
    green: false,
    duration: "Week 1–2",
    desc: "We begin by understanding your business goals, regulatory requirements (WHO-GMP, EU-GMP, US-FDA), product type, and scale of operations. Our experts conduct a needs assessment call or site visit.",
    deliverables: ["Needs assessment report","Regulatory checklist","Scope of work draft","Budget ballpark"],
    qa: [
      ["What pharma products will you manufacture?", "Fabtech supports a wide range of pharma products — tablets, injectables, biologics, APIs, nutraceuticals, and more. During the consultation we map your product type to the right facility class and regulatory standard."],
      ["Which GMP standards apply to my market?", "It depends on where you're selling. WHO-GMP covers most developing markets, EU-GMP is required for European distribution, and US-FDA cGMP applies for the US market. Our regulatory experts will guide you based on your target markets."],
      ["What's a typical project budget range?", "Projects vary widely based on size, location, and complexity. A small cleanroom setup can start from a few crores, while a full greenfield pharma plant can run into hundreds of crores. We provide a ballpark estimate after the initial needs assessment."],
      ["How long does the consultation phase take?", "Typically 1–2 weeks. It involves 1–2 calls or meetings, followed by our team preparing a needs assessment report and a draft scope of work for your review."]
    ]
  },
  {
    title: "Site assessment & feasibility",
    label: "Site Survey",
    icon: "ti-map-pin",
    green: false,
    duration: "Week 2–4",
    desc: "Our engineering team visits your site (or reviews drawings) to assess civil structure, utilities availability (power, water, compressed air), and environmental conditions. A feasibility report is prepared.",
    deliverables: ["Site survey report","Utility requirement list","Feasibility assessment","Risk register"],
    qa: [
      ["How does Fabtech assess an existing building?", "Our engineers review structural drawings, ceiling heights, load-bearing capacity, existing utility connections (power, HVAC, water), and access points. We assess what can be retained and what needs modification to meet GMP standards."],
      ["What utilities are needed for a cleanroom?", "A cleanroom typically requires a stable power supply with backup, chilled water for HVAC cooling, compressed air (oil-free), purified water or WFI systems, and a drainage system. We map all requirements in our utility report."],
      ["Can Fabtech work on greenfield sites?", "Absolutely. Fabtech handles greenfield projects from scratch — civil construction, utilities installation, cleanroom build-out, and equipment. We can also coordinate with your civil contractor if one is already appointed."],
      ["What is included in the risk register?", "Our risk register identifies potential project risks — civil delays, utility gaps, regulatory non-compliance points, and site access issues — along with mitigation strategies. This helps avoid surprises during construction."]
    ]
  },
  {
    title: "Design & engineering",
    label: "Design",
    icon: "ti-ruler-2",
    green: false,
    duration: "Week 4–10",
    desc: "Our in-house design team creates detailed layout drawings, HVAC schematics, airflow studies (CFD), process flow diagrams, and equipment specifications — all aligned with your regulatory requirements.",
    deliverables: ["Architectural floor plans","HVAC & cleanroom design","CFD airflow analysis","P&ID diagrams","Equipment list"],
    qa: [
      ["What is CFD analysis and why does it matter?", "CFD (Computational Fluid Dynamics) is a computer simulation that models how air flows inside your cleanroom. It helps us predict contamination risk zones, optimise HEPA filter placement, and ensure consistent air pressure — all before construction begins."],
      ["How does Fabtech ensure GMP-compliant design?", "All our designs follow cGMP guidelines — unidirectional workflow, personnel and material separation, appropriate pressure cascades between zones, and surface finishes that are easy to clean and resistant to contamination."],
      ["Can we customize the cleanroom layout?", "Yes, fully. We design around your process flow, equipment dimensions, staff count, and product requirements. We present multiple layout options with pros and cons before you approve the final design."],
      ["What are P&ID diagrams?", "P&ID stands for Piping and Instrumentation Diagram. These are detailed engineering drawings that show all process equipment, pipework, instrumentation, and control systems — essential for installation and future maintenance."]
    ]
  },
  {
    title: "Equipment manufacturing",
    label: "Manufacturing",
    icon: "ti-tools",
    green: false,
    duration: "Week 8–20",
    desc: "Fabtech manufactures prefabricated cleanroom panels, HVAC units, AHUs, water treatment systems, and process equipment at our own factories near Mumbai — ensuring quality control at every stage.",
    deliverables: ["Prefabricated panels","AHU systems","WFI/purified water systems","Process equipment","FAT certificates"],
    qa: [
      ["What does Fabtech manufacture in-house?", "Fabtech manufactures cleanroom wall and ceiling panels, air handling units (AHUs), HEPA filter housings, pass boxes, laminar flow units, WFI and purified water systems, and various process equipment — all in our Mumbai-area facilities."],
      ["What is a Factory Acceptance Test (FAT)?", "FAT is a quality check performed at our factory before equipment is shipped to your site. You or your team can attend to verify the equipment meets specifications, runs correctly, and is ready for installation. A FAT certificate is issued upon completion."],
      ["How are panels shipped internationally?", "Panels are prefabricated to precise dimensions, packed in protective crating, and shipped via sea or air freight depending on your location and timeline. Our logistics team handles customs documentation and delivery coordination."],
      ["What materials are used for cleanroom panels?", "Our panels typically use a mineral core (rockwool or PIR) sandwiched between powder-coated galvanized steel sheets. They are non-shedding, easy to clean, fire-resistant, and meet international cleanroom standards."]
    ]
  },
  {
    title: "Construction & installation",
    label: "Installation",
    icon: "ti-crane",
    green: false,
    duration: "Week 16–36",
    desc: "Our project management team oversees complete civil work, cleanroom panel installation, HVAC, electrical & utilities, and equipment placement — executed by trained Fabtech engineers on-site.",
    deliverables: ["Cleanroom constructed","HVAC commissioned","Utilities connected","Equipment installed","As-built drawings"],
    qa: [
      ["How long does cleanroom construction take?", "Typically 3–5 months depending on size and complexity. A small single-room cleanroom can be completed faster, while a full multi-zone pharma plant can take 6–9 months. Your project manager will share a detailed Gantt chart timeline."],
      ["Does Fabtech manage the entire construction site?", "Yes. Fabtech provides a dedicated project manager who coordinates all trades — civil, mechanical, electrical, plumbing, and HVAC. You get a single point of contact throughout."],
      ["What is the installation process for panels?", "Panels arrive pre-fabricated and are assembled on-site like a precision kit. Floors are prepared first, then walls and ceiling panels are erected, followed by airtight sealing of all joints. HVAC and electrical are integrated during the panel installation stage."],
      ["What are as-built drawings?", "As-built drawings are updated engineering drawings that reflect the actual construction as completed — including any changes made during installation. These are handed over to you for future maintenance, audits, and regulatory inspections."]
    ]
  },
  {
    title: "Qualification & validation",
    label: "Qualification",
    icon: "ti-certificate",
    green: false,
    duration: "Week 34–44",
    desc: "We perform IQ, OQ, and PQ for all systems. Air particle counts, pressure differentials, temperature mapping, and microbial monitoring are conducted to certify your facility.",
    deliverables: ["IQ/OQ/PQ protocols","Validation reports","Environmental monitoring data","HEPA filter certification","Cleanroom classification certificate"],
    qa: [
      ["What is IQ OQ PQ in pharma?", "IQ (Installation Qualification) confirms everything is installed correctly per specifications. OQ (Operational Qualification) verifies systems operate as intended. PQ (Performance Qualification) proves the facility consistently performs within required parameters under actual operating conditions."],
      ["How are cleanrooms classified (ISO 5 6 7 8)?", "Cleanroom classification is based on the number of airborne particles per cubic metre. ISO 5 is the strictest (like a sterile filling room), while ISO 8 is the least strict (like a general manufacturing corridor). The classification required depends on your product and regulatory standard."],
      ["What validation documents does Fabtech provide?", "Fabtech provides complete validation dossiers including protocols, test results, deviation reports, and final summary reports for IQ, OQ, and PQ. These are formatted to be audit-ready for WHO, EU-GMP, or US-FDA inspections."],
      ["How long does qualification take?", "Typically 6–10 weeks depending on the number of rooms and systems to validate. Fabtech's validation team works systematically to avoid delays, and we coordinate with your QA team throughout."]
    ]
  },
  {
    title: "Training & handover",
    label: "Handover",
    icon: "ti-hand-move",
    green: true,
    duration: "Week 44–48",
    desc: "Fabtech trains your team on operations, maintenance, and SOPs. We hand over all drawings, validation packages, and O&M manuals. Post-handover support and AMC options are available.",
    deliverables: ["Operator training","SOP documentation","Validation dossier","O&M manuals","AMC agreement"],
    qa: [
      ["What training does Fabtech provide?", "We train your operators on cleanroom gowning and behaviour, HVAC and equipment operation, cleaning and sanitisation procedures, environmental monitoring, and basic troubleshooting. Training is documented and sign-off sheets are included in the handover pack."],
      ["What is included in the validation dossier?", "The dossier includes all IQ/OQ/PQ protocols and reports, environmental monitoring data, HEPA test certificates, equipment calibration records, and a master validation plan. It is the primary document for regulatory inspections."],
      ["What post-handover support is available?", "Fabtech offers Annual Maintenance Contracts (AMC) covering preventive maintenance, HEPA filter replacements, re-qualification after modifications, and 24/7 emergency support. Our teams are present across multiple countries for quick response."],
      ["Can Fabtech help during a regulatory inspection?", "Yes. Our validation and regulatory teams can support your team during audits by WHO, EU-GMP inspectors, or US-FDA. We also offer gap assessments if you're preparing for an upcoming inspection."]
    ]
  },
  {
    title: "Get in touch",
    label: "Contact",
    icon: "ti-send",
    green: true,
    duration: "",
    desc: "Ready to start your pharma plant project? Share your details and a Fabtech expert will reach out within 24 hours.",
    deliverables: [],
    qa: []
  }
];

const fallbackReplies = [
  "Great question! For specific details on this, our project team would be best placed to advise you directly. Use the contact form on the last step to get in touch.",
  "That's a common query from our clients. The answer depends on your specific project scope and location — our experts can give you a tailored response. Feel free to reach out via the contact form.",
  "Each project is unique, so the best answer depends on your requirements. Our team is happy to walk you through this in detail — just drop your details on the final step.",
  "Fabtech has handled this across many projects in 53+ countries, so we have a strong answer for you. Get in touch via the contact form and we'll connect you with the right expert."
];

let current = 0;

function renderTrack() {
  const t = document.getElementById('steps-track');
  t.innerHTML = '';
  steps.forEach((s, i) => {
    if (i > 0) {
      const c = document.createElement('div');
      c.className = 'connector' + (i <= current ? ' done' : '');
      t.appendChild(c);
    }
    const wrap = document.createElement('div');
    wrap.className = 'step-dot-wrap';
    wrap.onclick = () => { current = i; render(); };
    const dot = document.createElement('div');
    dot.className = 'step-dot' + (i === current ? ' active' : i < current ? ' done' : '');
    dot.innerHTML = i < current ? '<i class="ti ti-check" style="font-size:13px"></i>' : (i + 1);
    const lbl = document.createElement('div');
    lbl.className = 'step-label' + (i === current ? ' active' : '');
    lbl.textContent = s.label;
    wrap.appendChild(dot);
    wrap.appendChild(lbl);
    t.appendChild(wrap);
  });
}

function renderCard() {
  const s = steps[current];
  const el = document.getElementById('step-card');
  if (current === steps.length - 1) {
    el.innerHTML = `<div class="card">
      <div class="card-header">
        <div class="step-badge green"><i class="ti ${s.icon}" style="font-size:14px"></i></div>
        <h2>${s.title}</h2>
      </div>
      <p>${s.desc}</p>
      <div class="lead-form" id="lead-form">
        <input id="lname" placeholder="Your full name" />
        <input id="lcompany" placeholder="Company name" />
        <input id="lemail" placeholder="Email address" type="email"/>
        <input id="lphone" placeholder="Phone / WhatsApp number" />
        <button onclick="submitLead()"><i class="ti ti-send" style="font-size:13px;vertical-align:-1px;margin-right:6px"></i>Request a consultation</button>
      </div>
    </div>`;
    return;
  }
  const tags = s.deliverables.map(d => `<span class="tag">${d}</span>`).join('');
  el.innerHTML = `<div class="card">
    <div class="card-header">
      <div class="step-badge${s.green?' green':''}"><i class="ti ${s.icon}" style="font-size:14px"></i></div>
      <h2>Step ${current + 1}: ${s.title}</h2>
    </div>
    <p>${s.desc}</p>
    ${s.deliverables.length ? `<div class="section-label">Deliverables</div><div class="deliverables">${tags}</div>` : ''}
    ${s.duration ? `<div class="timeline-row"><i class="ti ti-clock" style="font-size:13px"></i>&nbsp;Typical timeline:&nbsp;<strong style="color:var(--text)">${s.duration}</strong></div>` : ''}
  </div>`;
}

function renderQuickBtns() {
  const s = steps[current];
  const el = document.getElementById('quick-btns');
  el.innerHTML = s.qa.map(pair => `<button class="quick-btn" onclick="askQuestion(this.dataset.q)" data-q="${pair[0].replace(/"/g,'&quot;')}">💬 ${pair[0]}</button>`).join('');
}

function renderNav() {
  const prev = document.getElementById('prev-btn');
  const next = document.getElementById('next-btn');
  prev.disabled = current === 0;
  if (current >= steps.length - 1) { next.disabled = true; next.innerHTML = 'Done'; }
  else if (current === steps.length - 2) { next.disabled = false; next.innerHTML = 'Get in touch <i class="ti ti-arrow-right"></i>'; }
  else { next.disabled = false; next.innerHTML = 'Next <i class="ti ti-arrow-right"></i>'; }
}

function renderMessages() {
  const s = steps[current];
  const el = document.getElementById('messages');
  el.innerHTML = '';
  if (current < steps.length - 1) {
    addMsg('ai', `Hi! I'm your Fabtech project guide. You're on <strong>Step ${current + 1}: ${s.title}</strong>. Click a question below or type your own.`);
  }
}

function render() {
  renderTrack();
  renderCard();
  renderQuickBtns();
  renderNav();
  renderMessages();
}

function changeStep(dir) {
  current = Math.max(0, Math.min(steps.length - 1, current + dir));
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function addMsg(role, text) {
  const el = document.createElement('div');
  el.className = 'msg ' + role;
  el.innerHTML = text;
  document.getElementById('messages').appendChild(el);
  document.getElementById('messages').scrollTop = 9999;
  return el;
}

function askQuestion(q) {
  addMsg('user', q);
  const s = steps[current];
  const match = s.qa.find(pair => pair[0].toLowerCase() === q.toLowerCase());
  setTimeout(() => {
    if (match) {
      addMsg('ai', match[1]);
    } else {
      addMsg('ai', fallbackReplies[Math.floor(Math.random() * fallbackReplies.length)]);
    }
  }, 400);
}

function sendMsg() {
  const inp = document.getElementById('chat-input');
  const q = inp.value.trim();
  if (!q) return;
  inp.value = '';
  addMsg('user', q);
  const s = steps[current];
  const match = s.qa.find(pair => pair[0].toLowerCase().split(' ').filter(w => w.length > 3).some(w => q.toLowerCase().includes(w)));
  setTimeout(() => {
    if (match) {
      addMsg('ai', match[1]);
    } else {
      addMsg('ai', fallbackReplies[Math.floor(Math.random() * fallbackReplies.length)]);
    }
  }, 400);
}

function submitLead() {
  const name = document.getElementById('lname').value.trim();
  const email = document.getElementById('lemail').value.trim();
  if (!name || !email) { alert('Please enter your name and email to continue.'); return; }
  document.getElementById('lead-form').innerHTML = `<div class="success-msg"><i class="ti ti-circle-check"></i><h3>Thank you, ${name}!</h3><p>A Fabtech expert will reach out to <strong>${email}</strong> within 24 hours.</p></div>`;
}

render();
</script>
</body>
</html>
